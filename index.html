<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhishu Store</title>

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="topbar"></div>

<nav class="navbar">
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <div>
      <h2>ZHISHU<span>STORE</span></h2>
      <small>Marketplace Digital</small>
    </div>
  </div>

  <div class="nav-right">
    <button class="theme-btn">☀️</button>
    <button class="admin-btn" onclick="loginAdmin()">Admin Panel</button>
  </div>
</nav>

<section class="hero">
  <div class="badge">✨ Marketplace Digital Terpercaya</div>
  <h1>Zhishu <span>Store</span></h1>
  <p>Game, aplikasi premium, dan jasa digital dengan harga terjangkau</p>
</section>

<section class="menu-navbar">
  <button class="menu-btn active" onclick="showPage('semua',this)">Semua</button>
  <button class="menu-btn" onclick="showPage('starlight',this)">Antrian Starlight</button>
  <button class="menu-btn" onclick="showPage('wdp',this)">Antrian WDP</button>
  <button class="menu-btn" onclick="showPage('skin',this)">Antrian Skin</button>
  <button class="menu-btn" onclick="showPage('callback',this)">Antrian Callback</button>
</section>

<section class="status-section">
  <div class="badge">✨ Real-time tracking</div>
  <h1 class="status-title">Status <span>Antrian</span></h1>
  <p class="order-desc">Semua order yang disetujui admin akan tampil realtime.</p>

  <div class="stats">
    <div class="stat-box"><h4>Total Antrian</h4><h2 id="total">0</h2></div>
    <div class="stat-box"><h4>Menunggu</h4><h2 id="waiting">0</h2></div>
    <div class="stat-box"><h4>Diproses</h4><h2 id="process">0</h2></div>
    <div class="stat-box"><h4>Selesai</h4><h2 id="done">0</h2></div>
  </div>
</section>

<section class="queue-list" id="semuaPage"></section>
<section class="queue-list hidden" id="starlightPage"></section>
<section class="queue-list hidden" id="wdpPage"></section>
<section class="queue-list hidden" id="skinPage"></section>
<section class="queue-list hidden" id="callbackPage"></section>

<script>
/* ================= UI ================= */
let currentPage = "semua";

window.showPage = function(page, btn){

  currentPage = page;

  document.querySelectorAll(".queue-list").forEach(el=>{
    el.classList.add("hidden");
  });

  document.getElementById(page + "Page")
  .classList.remove("hidden");

  document.querySelectorAll(".menu-btn")
  .forEach(b=>b.classList.remove("active"));

  if(btn) btn.classList.add("active");

  // PAKSA REFRESH ANGKA
  const event = new Event("refreshStats");
  window.dispatchEvent(event);
}

function loginAdmin(){
  const u = prompt("Masukkan Username");
  const p = prompt("Masukkan Password");

  if(u==="zhishustore" && p==="zhishustore2026"){
    window.location.href="admin.html";
  } else {
    alert("Username atau Password salah");
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBvAFRVVUmx8zrfa9E8EprvaTjtDyVgM-4",
  authDomain: "order-2ed47.firebaseapp.com",
  projectId: "order-2ed47",
  storageBucket: "order-2ed47.firebasestorage.app",
  messagingSenderId: "1063088764123",
  appId: "1:1063088764123:web:0565ef484740fb6a94c8fe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STATE GLOBAL ================= */
window.currentPage = "semua";

/* ================= ELEMENT ================= */
const semuaPage = document.getElementById("semuaPage");
const starlightPage = document.getElementById("starlightPage");
const wdpPage = document.getElementById("wdpPage");
const skinPage = document.getElementById("skinPage");
const callbackPage = document.getElementById("callbackPage");

/* ================= NORMALIZER (WAJIB) ================= */
const norm = (v) => (v || "").toString().toLowerCase().trim();

/* ================= RENDER ================= */
function renderCard(item, index) {
  return `
    <div class="queue-card">
      <div class="queue-top">
        <div class="tag">#${index + 1}</div>
        <div class="status ${norm(item.status)}">
          ${norm(item.status).toUpperCase()}
        </div>
      </div>

      <div class="info-grid">
        <div class="info"><small>NAMA</small><h3>${item.nama || "-"}</h3></div>
        <div class="info"><small>PRODUK</small><h3>${item.produk || "-"}</h3></div>
        <div class="info"><small>ID SERVER</small><h3>${item.server || "-"}</h3></div>
        <div class="info"><small>NICKNAME</small><h3>${item.nickname || "-"}</h3></div>
        <div class="info"><small>KATEGORI</small><h3>${item.kategori || "-"}</h3></div>
        <div class="info"><small>TANGGAL</small><h3>${item.tanggal || "-"}</h3></div>
        <div class="info"><small>ESTIMASI</small><h3>${item.estimasi || "-"}</h3></div>
      </div>
    </div>
  `;
}
/* ================= REALTIME ================= */
let allData = [];

onSnapshot(collection(db, "antrian"), (snapshot) => {

  // AMBIL DATA FIREBASE
  allData = snapshot.docs.map(doc => doc.data());

  /* URUTKAN DATA TERLAMA -> TERBARU */
allData.sort((a, b) => {

  const statusOrder = {
    "menunggu": 1,
    "diproses": 2,
    "selesai": 3
  };

  const statusA = statusOrder[norm(a.status)] || 99;
  const statusB = statusOrder[norm(b.status)] || 99;

  // PRIORITAS STATUS
  if(statusA !== statusB){
    return statusA - statusB;
  }

  // JIKA STATUS SAMA → URUT CREATED AT
  return a.createdAt - b.createdAt;
});

  // RESET PAGE
  semuaPage.innerHTML = "";
  starlightPage.innerHTML = "";
  wdpPage.innerHTML = "";
  skinPage.innerHTML = "";

  // ================= GLOBAL =================
  let global = {
    total: 0,
    waiting: 0,
    process: 0,
    done: 0
  };

  // ================= FILTER DATA =================
  let starlightData = [];
  let wdpData = [];
  let skinData = [];
  let callbackData = [];

  // LOOP DATA
  allData.forEach(item => {

    const kategori = norm(item.kategori);
    const status = norm(item.status);

    // GLOBAL COUNT
    global.total++;

    if(status === "menunggu") global.waiting++;
    if(status === "diproses") global.process++;
    if(status === "selesai") global.done++;

    // FILTER CATEGORY
    if(kategori === "starlight"){
      starlightData.push(item);
    }

    if(kategori === "wdp"){
      wdpData.push(item);
    }

    if(kategori === "skin"){
      skinData.push(item);
    }
    if(kategori === "callback"){
      callbackData.push(item);
    }
  });

  // ================= RENDER =================
  function renderList(list, container){
    container.innerHTML = "";

    list.forEach((item, index)=>{
      container.innerHTML += renderCard(item, index);
    });
  }

  renderList(allData, semuaPage);
  renderList(starlightData, starlightPage);
  renderList(wdpData, wdpPage);
  renderList(skinData, skinPage);
  renderList(callbackData, callbackPage);

  // ================= COUNT STATUS =================
  function countStatus(list){
    return {
      total: list.length,

      waiting: list.filter(
        i => norm(i.status) === "menunggu"
      ).length,

      process: list.filter(
        i => norm(i.status) === "diproses"
      ).length,

      done: list.filter(
        i => norm(i.status) === "selesai"
      ).length
    };
  }

  const starlight = countStatus(starlightData);
  const wdp = countStatus(wdpData);
  const skin = countStatus(skinData);
  const callback = countStatus(callbackData);
  // ================= UPDATE UI =================
  function setUI(obj){
    document.getElementById("total").innerText = obj.total;
    document.getElementById("waiting").innerText = obj.waiting;
    document.getElementById("process").innerText = obj.process;
    document.getElementById("done").innerText = obj.done;
  }

  if(currentPage === "semua"){
    setUI(global);
  }

  if(currentPage === "starlight"){
    setUI(starlight);
  }

  if(currentPage === "wdp"){
    setUI(wdp);
  }

  if(currentPage === "skin"){
    setUI(skin);
  }
  if(currentPage === "callback"){
        setUI(callback);
    }
  // ================= REFRESH SAAT PINDAH MENU =================
  window.addEventListener("refreshStats", () => {

    if(currentPage === "semua"){
      setUI(global);
    }

    if(currentPage === "starlight"){
      setUI(starlight);
    }

    if(currentPage === "wdp"){
      setUI(wdp);
    }

    if(currentPage === "skin"){
      setUI(skin);
    }

    if(currentPage === "callback"){
      setUI(callback);
    }

  });
});
</script>

</body>
</html>
