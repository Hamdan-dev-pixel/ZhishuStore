<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Panel</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="topbar"></div>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">

      <div class="logo-icon">
        ⚡
      </div>

      <div>
        <h2>ADMIN<span>PANEL</span></h2>
        <small>Kelola Antrian</small>
      </div>

    </div>

    <div class="nav-right">

      <a href="index.html">
        <button class="admin-btn">
          Beranda
        </button>
      </a>

    </div>

  </nav>

  <!-- FORM TAMBAH -->

  <section class="order-form">

    <div class="badge">
      ✨ Tambah Order
    </div>

    <h1 class="status-title">
      Kelola <span>Antrian</span>
    </h1>

    <p class="order-desc">
      Tambahkan order baru lalu tampilkan ke beranda realtime.
    </p>

    <div class="form-grid">

      <input type="text"
      id="nama"
      placeholder="Nama">

      <input type="text"
      id="produk"
      placeholder="Produk">

      <input type="text"
      id="server"
      placeholder="ID Server">

      <input type="text"
      id="nickname"
      placeholder="Nickname">
      <input type="date"
id="tanggalOrder">
<input type="date"
id="estimasiOrder">
<input type="text"
      id="akunGift"
      placeholder="ID Akun Gift (Opsional)">
<select id="kategoriSelect">
  <option value="starlight">
    Starlight
  </option>

  <option value="wdp">
    WDP
  </option>

  <option value="skin">
    Skin
  </option>
    <option value="callback">
        Callback

</select>
      <select id="statusSelect">

        <option value="menunggu">
          Menunggu
        </option>

        <option value="diproses">
          Diproses
        </option>

        <option value="selesai">
          Selesai
        </option>

      </select>

    </div>

    <button onclick="tambahOrder()"
    class="submit-btn">
      Tambah Order
    </button>

  </section>

  <!-- LIST -->

  <section class="queue-list"
  id="adminList">

  </section>
<style>
    #kategoriSelect{
  padding:18px;
  border:none;
  background:#f5f5f5;
  border-radius:18px;
  font-size:16px;
  outline:none;
}

    #statusSelect{
      padding:18px;
      border:none;
      background:#f5f5f5;
      border-radius:18px;
      font-size:16px;
      outline:none;
    }

    .admin-action{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:25px;
    }

    .yellow-btn,
    .blue-btn,
    .green-btn,
    .red-btn{
      padding:12px 18px;
      border:none;
      border-radius:14px;
      color:white;
      cursor:pointer;
      font-weight:600;
    }

    .yellow-btn{
      background:#eab308;
    }

    .blue-btn{
      background:#3b82f6;
    }

    .green-btn{
      background:#16a34a;
    }

    .red-btn{
      background:#dc2626;
    }
    #tanggalOrder,
#estimasiOrder{
  padding:18px;
  border:none;
  background:#f5f5f5;
  border-radius:18px;
  font-size:16px;
  outline:none;
}

  </style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvAFRVVUmx8zrfa9E8EprvaTjtDyVgM-4",
  authDomain: "order-2ed47.firebaseapp.com",
  projectId: "order-2ed47",
  storageBucket: "order-2ed47.firebasestorage.app",
  messagingSenderId: "1063088764123",
  appId: "1:1063088764123:web:0565ef484740fb6a94c8fe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const adminList = document.getElementById("adminList");

/* REALTIME */
onSnapshot(collection(db, "antrian"), (snapshot) => {

  adminList.innerHTML = "";

  // AMBIL DATA
  let dataList = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  // SORT STATUS + CREATED AT
  dataList.sort((a, b) => {

    const statusOrder = {
      "menunggu": 1,
      "diproses": 2,
      "selesai": 3
    };

    const statusA = statusOrder[(a.status || "").toLowerCase()] || 99;
    const statusB = statusOrder[(b.status || "").toLowerCase()] || 99;

    // PRIORITAS STATUS
    if(statusA !== statusB){
      return statusA - statusB;
    }

    // JIKA STATUS SAMA
    return a.createdAt - b.createdAt;
  });

  // RENDER
  dataList.forEach((data, index) => {

    adminList.innerHTML += `
      <div class="queue-card">

        <div class="queue-top">
          <div class="tag">#${index + 1}</div>

          <div class="status ${data.status}">
            ${data.status.toUpperCase()}
          </div>
        </div>

        <div class="info-grid">
          <div class="info"><small>NAMA</small><h3>${data.nama}</h3></div>
          <div class="info"><small>PRODUK</small><h3>${data.produk}</h3></div>
          <div class="info"><small>ID SERVER</small><h3>${data.server}</h3></div>
          <div class="info"><small>NICKNAME</small><h3>${data.nickname}</h3></div>
          <div class="info"><small>KATEGORI</small><h3>${data.kategori}</h3></div>
          <div class="info"><small>TANGGAL</small><h3>${data.tanggal}</h3></div>
          <div class="info"><small>ESTIMASI</small><h3>${data.estimasi}</h3></div>
          <div class="info"><small>Akun Gift</small><h3>${data.akunGift || "-"}</h3></div>
        </div>

        <div class="admin-action">
          <button onclick="ubahStatus('${data.id}','menunggu')" class="yellow-btn">Menunggu</button>

          <button onclick="ubahStatus('${data.id}','diproses')" class="blue-btn">Diproses</button>

          <button onclick="ubahStatus('${data.id}','selesai')" class="green-btn">Selesai</button>

          <button onclick="hapusOrder('${data.id}')" class="red-btn">Hapus</button>
        </div>

      </div>
    `;
  });

});

/* TAMBAH */
window.tambahOrder = async function () {

  const nama = document.getElementById("nama").value;
  const produk = document.getElementById("produk").value;
  const server = document.getElementById("server").value;
  const nickname = document.getElementById("nickname").value;
  const status = document.getElementById("statusSelect").value;
  const kategori = document.getElementById("kategoriSelect").value;
  const tanggal = document.getElementById("tanggalOrder").value;
  const estimasi = document.getElementById("estimasiOrder").value;
  const akunGift = document.getElementById("akunGift").value;

  if (!nama || !produk || !server || !nickname) {
    alert("Lengkapi data!");
    return;
  }

  await addDoc(collection(db, "antrian"), {
    nama,
    produk,
    server,
    nickname,
    status,
    kategori,
    tanggal,
    estimasi,
    akunGift,
    createdAt: Date.now()
  });

  alert("Order berhasil!");
};

/* UPDATE */
window.ubahStatus = async function (id, status) {
  await updateDoc(doc(db, "antrian", id), {
    status
  });
};

/* DELETE */
window.hapusOrder = async function (id) {
  await deleteDoc(doc(db, "antrian", id));
};

</script>
</body>
</html>
