<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://bbvgmeqakkdjmiarafqt.supabase.co";

const SUPABASE_KEY =
"sb_publishable_aG3d7IGH0xsJZogxdRNP-A_QkQXK97a";

const supabase =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

</script>
<body>

  <div class="topbar"></div>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">

      <div class="logo-icon">
        ⚡
      </div>

      <div>
        <h2>ADMIN<span>PANEL</span></h2>
        <small>Kelola Antrian</small>
      </div>

    </div>

    <div class="nav-right">

      <a href="index.html">
        <button class="admin-btn">
          Beranda
        </button>
      </a>

    </div>

  </nav>

  <!-- FORM TAMBAH -->

  <section class="order-form">

    <div class="badge">
      ✨ Tambah Order
    </div>

    <h1 class="status-title">
      Kelola <span>Antrian</span>
    </h1>

    <p class="order-desc">
      Tambahkan order baru lalu tampilkan ke beranda realtime.
    </p>

    <div class="form-grid">

      <input type="text"
      id="nama"
      placeholder="Nama">

      <input type="text"
      id="produk"
      placeholder="Produk">

      <input type="text"
      id="server"
      placeholder="ID Server">

      <input type="text"
      id="nickname"
      placeholder="Nickname">
      <input type="date"
id="tanggalOrder">

<input type="date"
id="estimasiOrder">
<select id="kategoriSelect">

  <option value="starlight">
    Starlight
  </option>

  <option value="wdp">
    WDP
  </option>

  <option value="skin">
    Skin
  </option>

</select>
      <select id="statusSelect">

        <option value="menunggu">
          Menunggu
        </option>

        <option value="diproses">
          Diproses
        </option>

        <option value="selesai">
          Selesai
        </option>

      </select>

    </div>

    <button onclick="tambahOrder()"
    class="submit-btn">
      Tambah Order
    </button>

  </section>

  <!-- LIST -->

  <section class="queue-list"
  id="adminList">

  </section>

  <script>
let dataAntrian = [];

const adminList =
document.getElementById("adminList");

async function renderAdmin(){

  const {
    data,
    error
  } = await supabase
  .from("antrian")
  .select("*")
  .order("id",{ascending:false});

  if(error){

    console.log(error);
    return;

  }

  dataAntrian = data;

  adminList.innerHTML = "";

  dataAntrian.forEach((item,index)=>{

    adminList.innerHTML += `

      <div class="queue-card">

        <div class="queue-top">

          <div class="tag">
            #${index + 1}
          </div>

          <div class="status ${item.status}">
            ${item.status.toUpperCase()}
          </div>

        </div>

        <div class="info-grid">

          <div class="info">
            <small>NAMA</small>
            <h3>${item.nama}</h3>
          </div>

          <div class="info">
            <small>PRODUK</small>
            <h3>${item.produk}</h3>
          </div>

          <div class="info">
            <small>ID SERVER</small>
            <h3>${item.server}</h3>
          </div>

          <div class="info">
            <small>NICKNAME</small>
            <h3>${item.nickname}</h3>
          </div>

        </div>

        <div class="admin-action">

          <button onclick="ubahStatus(${item.id},'menunggu')"
          class="yellow-btn">
            Menunggu
          </button>

          <button onclick="ubahStatus(${item.id},'diproses')"
          class="blue-btn">
            Diproses
          </button>

          <button onclick="ubahStatus(${item.id},'selesai')"
          class="green-btn">
            Selesai
          </button>

          <button onclick="hapusOrder(${item.id})"
          class="red-btn">
            Hapus
          </button>

        </div>

      </div>

    `;

  });

}

async function ubahStatus(id,status){

  await supabase
  .from("antrian")
  .update({
    status:status
  })
  .eq("id",id);

  renderAdmin();

}

async function hapusOrder(id){

  await supabase
  .from("antrian")
  .delete()
  .eq("id",id);

  renderAdmin();

}

renderAdmin();

supabase
.channel("admin-realtime")
.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"antrian"
  },
  payload => {

    renderAdmin();

  }
)
.subscribe();
async function tambahOrder(){

  const nama =
  document.getElementById("nama").value;

  const produk =
  document.getElementById("produk").value;

  const server =
  document.getElementById("server").value;

  const nickname =
  document.getElementById("nickname").value;

  const status =
  document.getElementById("statusSelect").value;

  const kategori =
  document.getElementById("kategoriSelect").value;

  const tanggal =
  document.getElementById("tanggalOrder").value;

  const estimasi =
  document.getElementById("estimasiOrder").value;

  if(
    nama == "" ||
    produk == "" ||
    server == "" ||
    nickname == "" ||
    tanggal == "" ||
    estimasi == ""
  ){

    alert("Lengkapi data");
    return;

  }

  const { error } =
  await supabase
  .from("antrian")
  .insert([{

    nama:nama,
    produk:produk,
    server:server,
    nickname:nickname,
    status:status,
    kategori:kategori,
    tanggal:tanggal,
    estimasi:estimasi

  }]);

  if(error){

    console.log(error);
    alert("Gagal tambah order");
    return;

  }

  alert("Order berhasil ditambahkan");

  document.getElementById("nama").value = "";
  document.getElementById("produk").value = "";
  document.getElementById("server").value = "";
  document.getElementById("nickname").value = "";
  document.getElementById("tanggalOrder").value = "";
  document.getElementById("estimasiOrder").value = "";

  renderAdmin();

}
  </script>

  <style>
    #kategoriSelect{
  padding:18px;
  border:none;
  background:#f5f5f5;
  border-radius:18px;
  font-size:16px;
  outline:none;
}

    #statusSelect{
      padding:18px;
      border:none;
      background:#f5f5f5;
      border-radius:18px;
      font-size:16px;
      outline:none;
    }

    .admin-action{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:25px;
    }

    .yellow-btn,
    .blue-btn,
    .green-btn,
    .red-btn{
      padding:12px 18px;
      border:none;
      border-radius:14px;
      color:white;
      cursor:pointer;
      font-weight:600;
    }

    .yellow-btn{
      background:#eab308;
    }

    .blue-btn{
      background:#3b82f6;
    }

    .green-btn{
      background:#16a34a;
    }

    .red-btn{
      background:#dc2626;
    }
    #tanggalOrder,
#estimasiOrder{
  padding:18px;
  border:none;
  background:#f5f5f5;
  border-radius:18px;
  font-size:16px;
  outline:none;
}

  </style>

</body>
</html>
